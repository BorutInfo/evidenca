<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napredna Evidenca s Termini</title>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f6fa; color: #333; }
        .zaslon { display: none; max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        .aktiven { display: block; }
        
        .glava-strani { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; position: relative; }
        .glava-strani h2, .glava-strani h3 { margin: 0; color: #2c3e50; font-size: 20px; }
        
        .datum-levo, .ura-desno { font-size: 20px; font-weight: bold; color: #2c3e50; font-family: Arial, sans-serif; }
        
        /* Gumbi na seznamu */
        .btn-meni { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; font-weight: bold; text-align: left; background-color: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; height: auto; }
        .btn-meni:active { background-color: #2980b9; }
        .btn-nazaj { position: absolute; left: 0; top: 50%; transform: translateY(-50%); background-color: #e2e8f0; color: #2c3e50; border: none; border-radius: 0 40px 40px 0; width: 30px; height: 60px; cursor: pointer; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 0; padding-right: 4px; box-shadow: 2px 2px 6px rgba(0,0,0,0.1); transition: background-color 0.2s; }
        .btn-nazaj:active { background-color: #cbd5e0; }
        
        /* Stil za klikalni termin pred imenom */
        .termin-znacka { background-color: #2c3e50; color: #f1c40f; padding: 2px 6px; border-radius: 4px; margin-right: 10px; font-family: monospace; cursor: pointer; border: 1px solid #f1c40f; display: inline-block; vertical-align: middle; }
        .termin-znacka:hover { background-color: #f1c40f; color: #2c3e50; }

        /* Podatki o učencu */
        .podatek-vrstica { font-size: 16px; margin: 12px 0; }
        .glavni-gumbi { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .btn-akcija { flex: 1; padding: 15px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .btn-potrdi { background-color: #2ecc71; }
        .btn-odpovej { background-color: #e74c3c; }
        
        /* Pobarvan gumb za prestavitev */
        .btn-prestavljeno { background-color: #e67e22; }
        
        /* Nastavitev minut in računov */
        .minute-sekcija { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .okence-minut { display: inline-block; padding: 10px 20px; background: #e2e8f0; font-weight: bold; border-radius: 5px; cursor: pointer; min-width: 60px; }
        .Prilagodilnik-minut { display: none; margin-top: 15px; justify-content: center; gap: 15px; }
        .btn-spon { padding: 10px 20px; font-size: 16px; border: none; background: #2c3e50; color: white; border-radius: 5px; cursor: pointer; }

        /* STILI ZA KOLEDAR */
        .koledar-sekcija { background: #fdfdfd; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; margin-bottom: 20px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.02); }
        .koledar-glava { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; color: #2c3e50; }
        .koledar-naslov-gumb { cursor: pointer; font-size: 15px; background: #e2e8f0; padding: 5px 14px; border-radius: 20px; display: inline-block; font-weight: bold; }
        .koledar-naslov-gumb:hover { background: #cbd5e0; }
        .koledar-nav-btn { background: none; border: none; font-size: 14px; cursor: pointer; color: #3498db; padding: 5px 10px; font-weight: bold; }
        .koledar-mreza { display: grid; gap: 4px; text-align: center; }
        .mreza-7 { grid-template-columns: repeat(7, 1fr); }
        .mreza-3 { grid-template-columns: repeat(3, 1fr); }
        .koledar-dan-ime { font-size: 11px; color: #a0aec0; font-weight: bold; margin-bottom: 2px; }
        .koledar-celica { padding: 6px 0; font-size: 13px; cursor: pointer; border-radius: 6px; color: #4a5568; }
        .koledar-celica:hover { background-color: #edf2f7; }
        .koledar-celica.trenutni-dan { background-color: #ebdcb0; color: #2c3e50; font-weight: bold; border: 1px solid #d6c494; }
        .koledar-celica.izbran-dan { background-color: #3498db; color: white; font-weight: bold; }
        .koledar-celica.izven-meseca { color: #cbd5e0; cursor: default; }
        .koledar-celica.izven-meseca:hover { background: none; }
        .koledar-mesec-celica { padding: 12px 0; font-size: 13px; cursor: pointer; border-radius: 6px; color: #2c3e50; font-weight: bold; }
        .koledar-mesec-celica:hover { background-color: #edf2f7; }
        .koledar-mesec-celica.trenutni-mesec { background-color: #ebdcb0; border: 1px solid #d6c494; }

        /* Stil za izpis prestavitve pod gumbi */
        .izpis-prestavitve { display: none; padding: 10px; background: #fff3e0; border: 1px solid #ffe0b2; border-radius: 8px; text-align: center; color: #e67e22; font-weight: bold; margin: 15px 0; font-size: 15px; }
        
        /* NOVI STILI ZA ZDRS (SWIPE) DNEVOV IN UČENCEV */
        .element-ovoj {
            position: relative;
            overflow: hidden;
            margin: 10px 0;
            border-radius: 8px;
            background-color: #e74c3c;
        }
        .element-ozadje-izbris {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            color: white;
            font-weight: bold;
            box-sizing: border-box;
            font-size: 16px;
        }
        .dinamicni-izbris-element {
            position: relative;
            transition: transform 0.2s ease-out;
            z-index: 2;
            margin: 0 !important;
        }
        .dinamicni-izbris-element.v-zdrsu {
            transition: none;
        }

        /* TISKANJE RAČUNA */
        @media print {
            body { background: white; padding: 0; }
            .zaslon { display: none !important; }
            #zaslon-racun { display: block !important; box-shadow: none; padding: 0; margin: 0; max-width: 100%; }
            .skrij-pri-tiskanju { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="zaslon-dnevi" class="zaslon aktiven">
        <div class="glava-strani">
            <div class="datum-levo prikaz-datuma"></div>
            <div class="ura-desno prikaz-ure">00:00</div>
        </div>

        <div class="koledar-sekcija">
            <div class="koledar-glava">
                <button class="koledar-nav-btn" onclick="navigirajKoledar(-1)">◀</button>
                <span id="koledar-naslov" class="koledar-naslov-gumb koledar-naslov-prikaz" onclick="preklopiPogledKoledarja()"></span>
                <button class="koledar-nav-btn" onclick="navigirajKoledar(1)">▶</button>
            </div>
            <div id="koledar-mreza" class="koledar-mreza-prikaz"></div>
        </div>

        <div id="seznam-dnevov-izpis"></div>

        <button class="btn-akcija btn-potrdi" style="width: 100%; margin-top: 15px; display: block; font-size: 16px;" onclick="dodajDanPrekoGesla()">+ Dodaj dan</button>
    </div>

    <div id="zaslon-ucenci" class="zaslon">
        <button class="btn-nazaj" onclick="nazajNaDneve()"><svg width="12" height="20" viewBox="0 0 12 20" style="fill:none; stroke:currentColor; stroke-width:3; stroke-linecap:round; stroke-linejoin:round;"><path d="M10 2L2 10L10 18"/></svg></button>
        <div class="glava-strani">
            <div class="datum-levo prikaz-datuma"></div>
            <div class="ura-desno prikaz-ure">00:00</div>
        </div>

        <div class="koledar-sekcija">
            <div class="koledar-glava">
                <button class="koledar-nav-btn" onclick="navigirajKoledar(-1)">◀</button>
                <span class="koledar-naslov-gumb koledar-naslov-prikaz" onclick="preklopiPogledKoledarja()"></span>
                <button class="koledar-nav-btn" onclick="navigirajKoledar(1)">▶</button>
            </div>
            <div class="koledar-mreza-prikaz"></div>
        </div>

        <div id="seznam-ucencev-izpis"></div>
        <button class="btn-akcija btn-potrdi" style="width: 100%; margin-top: 15px; display: block; font-size: 16px;" onclick="dodajUcenca()">+ Dodaj učenca</button>
    </div>

    <div id="zaslon-podatki" class="zaslon">
        <button class="btn-nazaj" onclick="nazajNaUcence()"><svg width="12" height="20" viewBox="0 0 12 20" style="fill:none; stroke:currentColor; stroke-width:3; stroke-linecap:round; stroke-linejoin:round;"><path d="M10 2L2 10L10 18"/></svg></button>
        <div class="glava-strani">
            <div class="datum-levo prikaz-datuma"></div>
            <h3 id="podatki-ime" style="position: absolute; left: 50%; transform: translateX(-50%); margin: 0; font-size: 20px; font-weight: bold; color: #2c3e50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 45%; text-align: center;">Ime Priimek</h3>
            <div class="ura-desno prikaz-ure">00:00</div>
        </div>

        <div class="koledar-sekcija">
            <div class="koledar-glava">
                <button class="koledar-nav-btn" onclick="navigirajKoledar(-1)">◀</button>
                <span class="koledar-naslov-gumb koledar-naslov-prikaz" onclick="preklopiPogledKoledarja()"></span>
                <button class="koledar-nav-btn" onclick="navigirajKoledar(1)">▶</button>
            </div>
            <div class="koledar-mreza-prikaz"></div>
        </div>
        
        <div class="podatek-vrstica">Termin uredbe: <strong id="podatki-termin" style="cursor:pointer; color:#3498db;" onclick="urediTerminIzProfila()">13:00</strong> <span style="font-size:12px; color:#7f8c8d;">(klikni za spremembo)</span></div>
        <div class="podatek-vrstica">Predvidenih ur v mesecu: <strong id="podatki-predvideno">4</strong></div>
        <div class="podatek-vrstica">Izvedenih ur: <strong id="podatki-izvedeno">0</strong></div>
        
        <div class="glavni-gumbi">
            <button class="btn-akcija btn-potrdi" onclick="zabeleziUro(true)">✓ Izvedeno</button>
            <button class="btn-akcija btn-odpovej" onclick="zabeleziUro(false)">✗ Neizvedeno</button>
            <button class="btn-akcija btn-prestavljeno" onclick="preklopiKoledarPrestavitev()">Prestavljeno</button>
        </div>

        <div id="prestavljeno-tekst-izpis" class="izpis-prestavitve"></div>

        <div id="sekcija-koledar-prestavitev" class="koledar-sekcija" style="display: none; margin-top: 15px;">
            <div class="koledar-glava">
                <button class="koledar-nav-btn" onclick="navigirajKoledarPrestavitev(-1)">◀</button>
                <span id="koledar-prestavitev-naslov" style="font-weight: bold; color: #2c3e50;"></span>
                <button class="koledar-nav-btn" onclick="navigirajKoledarPrestavitev(1)">▶</button>
            </div>
            <div id="koledar-prestavitev-mreza" class="koledar-mreza mreza-7"></div>
        </div>

        <div class="minute-sekcija">
            <div class="podatek-vrstica">Dolžina ure:</div>
            <div class="okence-minut" id="okence-izpis" onclick="prikaziGumbaZaMinute()">30 min</div>
            
            <div class="Prilagodilnik-minut" id="minute-gumbi">
                <button class="btn-spon" onclick="prilagodiMinute(-5)">- 5 min</button>
                <button class="btn-spon" onclick="prilagodiMinute(5)">+ 5 min</button>
            </div>
        </div>

        <div class="minute-sekcija" style="background: #f0f4f8; border: 1px solid #dce4ec;">
            <div class="podatek-vrstica">Cena posamezne ure (€):</div>
            <input type="number" id="vnos-cene-ure" value="20" style="width: 80px; padding: 6px; text-align: center; font-size: 16px; border-radius: 6px; border: 1px solid #cbd5e0; margin-bottom: 10px;">
            <button class="btn-akcija" style="background-color: #9b59b6; width: 100%; display: block;" onclick="generirajPodatkeRacuna()">Pripravi račun</button>
        </div>
    </div>

    <div id="zaslon-racun" class="zaslon">
        <button class="btn-nazaj skrij-pri-tiskanju" onclick="nazajNaPodatke()"><svg width="12" height="20" viewBox="0 0 12 20" style="fill:none; stroke:currentColor; stroke-width:3; stroke-linecap:round; stroke-linejoin:round;"><path d="M10 2L2 10L10 18"/></svg></button>
        
        <div class="glava-strani skrij-pri-tiskanju">
            <h3>Predogled računa</h3>
        </div>

        <div id="vsebina-pdf-racuna" style="background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 13px; color: #000; line-height: 1.4;">
        </div>

        <button class="btn-akcija btn-potrdi skrij-pri-tiskanju" style="width: 100%; margin-top: 15px; font-size: 16px;" onclick="window.print()">Shrani kot PDF / Natisni</button>
    </div>

    <script>
        // Globalna baza podatkov
        let bazaUcencev = {
            'Ponedeljek': [
                { id: 1, ime: 'Janez Novak', predvideno: 4, izvedeno: 1, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null },
                { id: 2, ime: 'Maja Horvat', predvideno: 4, izvedeno: 0, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null },
                { id: 3, ime: 'Luka Zupan', predvideno: 4, izvedeno: 2, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null },
                { id: 4, ime: 'Katarina Eržen', predvideno: 4, izvedeno: 1, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null }
            ],
            'Torek': [
                { id: 5, ime: 'Ana Kovač', predvideno: 4, izvedeno: 1, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null },
                { id: 6, ime: 'Miha Golob', predvideno: 4, izvedeno: 3, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null },
                { id: 7, ime: 'Ema Kralj', predvideno: 4, izvedeno: 0, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null }
            ],
            'Sreda': [
                { id: 8, ime: 'Peter Car', predvideno: 4, izvedeno: 0, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null },
                { id: 9, ime: 'Sara Vidmar', predvideno: 4, izvedeno: 2, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null }
            ],
            'Četrtek': [
                { id: 10, ime: 'Borut Pahor', predvideno: 4, izvedeno: 1, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null }
            ],
            'Petek': [
                { id: 11, ime: 'Rok Kos', predvideno: 4, izvedeno: 4, minute: 30, termin: '', prestavljenoOpomba: '', cenaUre: 20, rescheduled: null }
            ]
        };

        const konfiguracijaDnevov = {
            'pon': { ime: 'Ponedeljek', kratica: 'PON', indeks: 0 },
            'tor': { ime: 'Torek', kratica: 'TOR', indeks: 1 },
            'sre': { ime: 'Sreda', kratica: 'SRE', indeks: 2 },
            'čet': { ime: 'Četrtek', kratica: 'ČET', indeks: 3 },
            'pet': { ime: 'Petek', kratica: 'PET', indeks: 4 },
            'sob': { ime: 'Sobota', kratica: 'SOB', indeks: 5 },
            'ned': { ime: 'Nedelja', kratica: 'NED', indeks: 6 }
        };

        let prikazaniDnevi = ['Ponedeljek', 'Torek', 'Sreda', 'Četrtek', 'Petek'];

        // --- SISTEM ZA SHRANJEVANJE (localStorage) ---
        function shraniPodatke() {
            localStorage.setItem('bazaUcencev', JSON.stringify(bazaUcencev));
            localStorage.setItem('prikazaniDnevi', JSON.stringify(prikazaniDnevi));
        }

        function naloziPodatke() {
            let shranjenaBaza = localStorage.getItem('bazaUcencev');
            let shranjeniDnevi = localStorage.getItem('prikazaniDnevi');
            
            if (shranjenaBaza) {
                bazaUcencev = JSON.parse(shranjenaBaza);
            } else {
                // Če shramba še ne obstaja, generiramo privzete termine ob prvem zagonu
                nastaviZacetneTermine();
            }
            
            if (shranjeniDnevi) {
                prikazaniDnevi = JSON.parse(shranjeniDnevi);
            }
        }

        function nastaviZacetneTermine() {
            for (let dan in bazaUcencev) {
                let ura = 13;
                let minute = 0;
                bazaUcencev[dan].forEach(ucenec => {
                    let strUre = String(ura).padStart(2, '0');
                    let strMin = String(minute).padStart(2, '0');
                    ucenec.termin = `${strUre}:${strMin}`;
                    minute += 30;
                    if (minute >= 60) {
                        ura += 1;
                        minute = 0;
                    }
                });
            }
            shraniPodatke();
        }

        let izbraniDan = '';
        let trenutniUcenec = null;

        let koledarDatum = new Date(); 
        let koledarPogled = 'teden'; 
        let koledarPrestavitevDatum = new Date();

        const slovenskiMeseci = ['Januar', 'Februar', 'Marec', 'April', 'Maj', 'Junij', 'Julij', 'Avgust', 'September', 'Oktober', 'November', 'December'];
        const slovenskiDneviKratki = ['P', 'T', 'S', 'Č', 'P', 'S', 'N'];

        function dodajDanPrekoGesla() {
            let vnos = prompt("Vnesite kratico dneva, ki jo želite prikazati (pon, tor, sre, čet, pet, sob, ned):");
            if (!vnos) return;
            let geslo = vnos.trim().toLowerCase();

            if (konfiguracijaDnevov[geslo]) {
                let imeDneva = konfiguracijaDnevov[geslo].ime;
                if (!prikazaniDnevi.includes(imeDneva)) {
                    prikazaniDnevi.push(imeDneva);
                    prikazaniDnevi.sort((a, b) => {
                        let konfA = Object.values(konfiguracijaDnevov).find(d => d.ime === a);
                        let konfB = Object.values(konfiguracijaDnevov).find(d => d.ime === b);
                        return konfA.indeks - konfB.indeks;
                    });
                    if (!bazaUcencev[imeDneva]) {
                        bazaUcencev[imeDneva] = [];
                    }
                    osveziSeznamDnevov();
                    shraniPodatke();
                } else {
                    alert("Ta dan je že prikazan!");
                }
            } else {
                alert("Napačna kratica! Uporabite: pon, tor, sre, čet, pet, sob ali ned.");
            }
        }

        function odstraniDan(imeDneva) {
            if (confirm(`Ali res želite umakniti dan ${imeDneva} s seznama ur?`)) {
                prikazaniDnevi = prikazaniDnevi.filter(dan => dan !== imeDneva);
                osveziSeznamDnevov();
                shraniPodatke();
            }
        }

        function osveziSeznamDnevov() {
            let trenutniDanTdna = koledarDatum.getDay();
            let razlikaDoPonedeljka = koledarDatum.getDate() - trenutniDanTdna + (trenutniDanTdna === 0 ? -6 : 1);
            let ponedeljek = new Date(koledarDatum.getFullYear(), koledarDatum.getMonth(), razlikaDoPonedeljka);

            let izpis = '';

            for (let i = 0; i < 7; i++) {
                let trenutniDan = new Date(ponedeljek);
                trenutniDan.setDate(ponedeljek.getDate() + i);
                
                let dan = trenutniDan.getDate();
                let mesec = trenutniDan.getMonth() + 1;
                let polniDatumTekst = `${dan}. ${mesec}.`;
                let gumbDatumStr = `${dan}.${mesec}.${trenutniDan.getFullYear()}`;
                
                let konf = Object.values(konfiguracijaDnevov).find(d => d.indeks === i);
                let imeDneva = konf.ime;

                let imaPrestavitevVTemTednu = false;
                for (let d in bazaUcencev) {
                    bazaUcencev[d].forEach(u => {
                        if (u.rescheduled) {
                            if ((d === imeDneva && u.rescheduled.odKodDatum === gumbDatumStr) || 
                                u.rescheduled.naKamDatum === gumbDatumStr) {
                                imaPrestavitevVTemTednu = true;
                            }
                        }
                    });
                }

                if (prikazaniDnevi.includes(imeDneva) || imaPrestavitevVTemTednu) {
                    let dodatekImeUcencev = '';
                    let oznakePrestavitevHtml = '';
                    let najdeniPrestavljeni = [];

                    for (let d in bazaUcencev) {
                        bazaUcencev[d].forEach(u => {
                            if (u.rescheduled) {
                                if (d === imeDneva && u.rescheduled.odKodDatum === gumbDatumStr) {
                                    najdeniPrestavljeni.push({ ucenec: u, tip: 'stran', opomba: u.prestavljenoOpomba });
                                }
                                if (u.rescheduled.naKamDatum === gumbDatumStr) {
                                    najdeniPrestavljeni.push({ ucenec: u, tip: 'sem', opomba: `Prestavljeno iz ${u.rescheduled.odKodDatum} ob ${u.rescheduled.naKamUra}` });
                                }
                            }
                        });
                    }

                    if (najdeniPrestavljeni.length > 0) {
                        let imena = najdeniPrestavljeni.map(p => p.ucenec.ime).join(', ');
                        dodatekImeUcencev = ` - ${imena} `;

                        oznakePrestavitevHtml = najdeniPrestavljeni.map(p => {
                            let barva = p.tip === 'sem' ? '#27ae60' : '#e67e22';
                            return `<div style="font-size: 12px; color: ${barva}; margin-top: 4px; font-weight: normal; line-height: 1.2;">• ${p.ucenec.ime}: ${p.opomba}</div>`;
                        }).join('');
                    }

                    let jeIzbran = jeIstiDatum(trenutniDan, koledarDatum);
                    let dodatniStil = jeIzbran ? 'background-color: #2c3e50; border: 2px solid #f1c40f;' : '';

                    izpis += `
                    <div class="element-ovoj">
                        <div class="element-ozadje-izbris">Brišem...</div>
                        <button class="btn-meni dinamicni-izbris-element" style="${dodatniStil} margin: 0; width: 100%; padding: 12px 15px;" data-tip="dan" data-kljuc="${imeDneva}" onclick="izvediKlikDneva(event, '${imeDneva}', '${polniDatumTekst}', ${trenutniDan.getTime()})">
                            <div style="width: 100%;">
                                <span style="font-weight: bold;">${konf.kratica} ${dan}. ${mesec}.</span>
                                ${oznakePrestavitevHtml}
                            </div>
                        </button>
                    </div>`;
                }
            }

            document.getElementById('seznam-dnevov-izpis').innerHTML = izpis;
            aktivirajSledilnikeZdrsa();
        }
        function izvediKlikDneva(event, imeDneva, polniDatumTekst, timestamp) {
            let el = event.currentTarget;
            if (el.style.transform && el.style.transform !== 'translateX(0px)') {
                return;
            }
            izberiDan(imeDneva, polniDatumTekst, timestamp);
        }

        function izvediKlikUcenca(event, dan, indeks) {
            let el = event.currentTarget;
            if (el.style.transform && el.style.transform !== 'translateX(0px)') {
                return;
            }
            prikaziProfilUcenca(dan, indeks);
        }

        function aktivirajSledilnikeZdrsa() {
            let elementi = document.querySelectorAll('.dinamicni-izbris-element');
            elementi.forEach(element => {
                let startX = 0;
                let trenutniX = 0;
                const mejaZaIzbris = -70;

                function obZacetku(e) {
                    startX = e.touches ? e.touches[0].clientX : e.clientX;
                    element.classList.add('v-zdrsu');
                }

                function obPremiku(e) {
                    let x = e.touches ? e.touches[0].clientX : e.clientX;
                    trenutniX = x - startX;
                    if (trenutniX > 0) trenutniX = 0;
                    if (trenutniX < -120) trenutniX = -120;
                    element.style.transform = `translateX(${trenutniX}px)`;
                }

                function obKoncu() {
                    element.classList.remove('v-zdrsu');
                    if (trenutniX < mejaZaIzbris) {
                        element.style.transform = 'translateX(-100%)';
                        setTimeout(() => {
                            let tip = element.getAttribute('data-tip');
                            let kljuc = element.getAttribute('data-kljuc');
                            let dan = element.getAttribute('data-dan');
                            let indeks = parseInt(element.getAttribute('data-indeks'));
                            
                            if (confirm('Zbrišem dokončno?')) {
                                if (tip === 'dan') {
                                    prikazaniDnevi = prikazaniDnevi.filter(dan => dan !== kljuc);
                                    osveziSeznamDnevov();
                                    shraniPodatke();
                                } else if (tip === 'ucenec') {
                                    bazaUcencev[dan].splice(indeks, 1);
                                    osveziSeznamUcencev();
                                    shraniPodatke();
                                }
                            } else {
                                element.style.transform = 'translateX(0px)';
                                trenutniX = 0;
                            }
                        }, 150);
                    } else {
                        element.style.transform = 'translateX(0px)';
                        trenutniX = 0;
                    }
                }

                element.addEventListener('touchstart', obZacetku, { passive: true });
                element.addEventListener('touchmove', obPremiku, { passive: true });
                element.addEventListener('touchend', obKoncu);

                element.addEventListener('mousedown', (e) => {
                    obZacetku(e);
                    function naPremikMiske(me) { obPremiku(me); }
                    function naKonecMiske() {
                        obKoncu();
                        window.removeEventListener('mousemove', naPremikMiske);
                        window.removeEventListener('mouseup', naKonecMiske);
                    }
                    window.addEventListener('mousemove', naPremikMiske);
                    window.addEventListener('mouseup', naKonecMiske);
                });
            });
        }

        function osveziKoledar() {
            let glave = document.querySelectorAll('.koledar-naslov-prikaz');
            let mreze = document.querySelectorAll('.koledar-mreza-prikaz');
            let danes = new Date();

            let tekstGlave = '';
            if (koledarPogled === 'leto') {
                tekstGlave = koledarDatum.getFullYear() + ' ▾';
            } else {
                tekstGlave = slovenskiMeseci[koledarDatum.getMonth()] + ' ' + koledarDatum.getFullYear() + ' ▾';
            }

            glave.forEach(glava => glava.innerText = tekstGlave);

            mreze.forEach(mreza => {
                mreza.innerHTML = '';
                if (koledarPogled === 'teden') {
                    mreza.className = 'koledar-mreza mreza-7 koledar-mreza-prikaz';
                    slovenskiDneviKratki.forEach(d => mreza.innerHTML += `<div class="koledar-dan-ime">${d}</div>`);
                    
                    let trenutniDanTdna = koledarDatum.getDay();
                    let razlikaDoPonedeljka = koledarDatum.getDate() - trenutniDanTdna + (trenutniDanTdna === 0 ? -6 : 1);
                    let ponedeljek = new Date(koledarDatum.getFullYear(), koledarDatum.getMonth(), razlikaDoPonedeljka);

                    for (let i = 0; i < 7; i++) {
                        let d = new Date(ponedeljek);
                        d.setDate(ponedeljek.getDate() + i);
                        let klasi = 'koledar-celica';
                        if (jeIstiDatum(d, danes)) klasi += ' trenutni-dan';
                        if (jeIstiDatum(d, koledarDatum)) klasi += ' izbran-dan';
                        mreza.innerHTML += `<div class="${klasi}" onclick="klikniDanKoledarja(${d.getTime()})">${d.getDate()}</div>`;
                    }
                } 
                else if (koledarPogled === 'mesec') {
                    mreza.className = 'koledar-mreza mreza-7 koledar-mreza-prikaz';
                    slovenskiDneviKratki.forEach(d => mreza.innerHTML += `<div class="koledar-dan-ime">${d}</div>`);
                    
                    let leto = koledarDatum.getFullYear();
                    let mesec = koledarDatum.getMonth();
                    let prviDan = new Date(leto, mesec, 1);
                    let zadnjiDan = new Date(leto, mesec + 1, 0);
                    
                    let startIndeks = prviDan.getDay() - 1;
                    if (startIndeks < 0) startIndeks = 6;
                    
                    let prejsnjiMesecZadnji = new Date(leto, mesec, 0).getDate();
                    for (let i = startIndeks - 1; i >= 0; i--) {
                        mreza.innerHTML += `<div class="koledar-celica izven-meseca">${prejsnjiMesecZadnji - i}</div>`;
                    }
                    
                    for (let i = 1; i <= zadnjiDan.getDate(); i++) {
                        let d = new Date(leto, mesec, i);
                        let klasi = 'koledar-celica';
                        if (jeIstiDatum(d, danes)) klasi += ' trenutni-dan';
                        if (jeIstiDatum(d, koledarDatum)) klasi += ' izbran-dan';
                        mreza.innerHTML += `<div class="${klasi}" onclick="klikniDanKoledarja(${d.getTime()})">${i}</div>`;
                    }
                } 
                else if (koledarPogled === 'leto') {
                    mreza.className = 'koledar-mreza mreza-3 koledar-mreza-prikaz';
                    slovenskiMeseci.forEach((m, indeks) => {
                        let klasi = 'koledar-mesec-celica';
                        if (indeks === danes.getMonth() && koledarDatum.getFullYear() === danes.getFullYear()) klasi += ' trenutni-mesec';
                        mreza.innerHTML += `<div class="${klasi}" onclick="klikniMesecKoledarja(${indeks})">${m.substring(0, 3)}.</div>`;
                    });
                }
            });

            osveziSeznamDnevov();
        }

        function preklopiPogledKoledarja() {
            if (koledarPogled === 'teden') koledarPogled = 'mesec';
            else if (koledarPogled === 'mesec') koledarPogled = 'leto';
            else koledarPogled = 'teden';
            osveziKoledar();
        }

        function klikniDanKoledarja(timestamp) {
            koledarDatum = new Date(timestamp);
            let danVTednu = koledarDatum.getDay();
            let nasIndeks = danVTednu === 0 ? 6 : danVTednu - 1;

            let konf = Object.values(konfiguracijaDnevov).find(d => d.indeks === nasIndeks);
            let imeDneva = konf.ime;

            osveziKoledar();
            
            let dan = koledarDatum.getDate();
            let mesec = koledarDatum.getMonth() + 1;
            izberiDan(imeDneva, `${dan}. ${mesec}.`, timestamp);
        }

        function klikniMesecKoledarja(mIndeks) {
            koledarDatum.setMonth(mIndeks);
            koledarPogled = 'mesec';
            osveziKoledar();
        }

        function navigirajKoledar(smer) {
            if (koledarPogled === 'teden') koledarDatum.setDate(koledarDatum.getDate() + (smer * 7));
            else if (koledarPogled === 'mesec') koledarDatum.setMonth(koledarDatum.getMonth() + smer);
            else if (koledarPogled === 'leto') koledarDatum.setFullYear(koledarDatum.getFullYear() + smer);
            osveziKoledar();
        }

        function preklopiKoledarPrestavitev() {
            let sekcija = document.getElementById('sekcija-koledar-prestavitev');
            if (sekcija.style.display === 'none') {
                sekcija.style.display = 'block';
                osveziKoledarPrestavitev();
            } else {
                sekcija.style.display = 'none';
            }
        }

        function osveziKoledarPrestavitev() {
            let glava = document.getElementById('koledar-prestavitev-naslov');
            let mreza = document.getElementById('koledar-prestavitev-mreza');
            mreza.innerHTML = '';

            let leto = koledarPrestavitevDatum.getFullYear();
            let mesec = koledarPrestavitevDatum.getMonth();

            glava.innerText = slovenskiMeseci[mesec] + ' ' + leto;
            slovenskiDneviKratki.forEach(d => mreza.innerHTML += `<div class="koledar-dan-ime">${d}</div>`);

            let prviDan = new Date(leto, mesec, 1);
            let zadnjiDan = new Date(leto, mesec + 1, 0);
            
            let startIndeks = prviDan.getDay() - 1;
            if (startIndeks < 0) startIndeks = 6;

            let prejsnjiMesecZadnji = new Date(leto, mesec, 0).getDate();
            for (let i = startIndeks - 1; i >= 0; i--) {
                mreza.innerHTML += `<div class="koledar-celica izven-meseca">${prejsnjiMesecZadnji - i}</div>`;
            }

            for (let i = 1; i <= zadnjiDan.getDate(); i++) {
                mreza.innerHTML += `<div class="koledar-celica" onclick="klikniDatumPrestavitev(${i}, ${mesec}, ${leto})">${i}</div>`;
            }
        }

        function navigirajKoledarPrestavitev(smer) {
            koledarPrestavitevDatum.setMonth(koledarPrestavitevDatum.getMonth() + smer);
            osveziKoledarPrestavitev();
        }

        function klikniDatumPrestavitev(dan, mesec, leto) {
            let vpisanaUra = prompt(`Vnesite uro za prestavitev na datum ${dan}.${mesec + 1}.${leto}:`, "14:00");
            if (vpisanaUra !== null && vpisanaUra.trim() !== "") {
                let celotenDatum = `${dan}.${mesec + 1}.${leto}`;
                let besedilo = `Prestavljeno na ${celotenDatum} ob ${vpisanaUra}`;
                
                trenutniUcenec.rescheduled = {
                    odKodDatum: `${koledarDatum.getDate()}.${koledarDatum.getMonth() + 1}.${koledarDatum.getFullYear()}`,
                    odKodDan: izbraniDan,
                    naKamDatum: celotenDatum,
                    naKamUra: vpisanaUra
                };
                
                trenutniUcenec.prestavljenoOpomba = besedilo;
                document.getElementById('prestavljeno-tekst-izpis').innerText = besedilo;
                document.getElementById('prestavljeno-tekst-izpis').style.display = 'block';
                document.getElementById('sekcija-koledar-prestavitev').style.display = 'none';
                osveziSeznamDnevov();
                shraniPodatke();
            }
        }

        function jeIstiDatum(d1, d2) {
            return d1.getDate() === d2.getDate() && d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();
        }

        function posodobiUro() {
            let danes = new Date();
            const kraticeDnevov = ['NED', 'PON', 'TOR', 'SRE', 'ČET', 'PET', 'SOB'];
            let kratica = kraticeDnevov[danes.getDay()];
            let dan = danes.getDate();
            let mesec = danes.getMonth() + 1;
            let ure = String(danes.getHours()).padStart(2, '0');
            let minute = String(danes.getMinutes()).padStart(2, '0');
            
            let formatiranDatum = kratica + '  ' + dan + '.' + mesec + '.';
            let formatiranaUra = ure + ':' + minute;
            
            document.querySelectorAll('.prikaz-datuma').forEach(el => el.innerText = formatiranDatum);
            document.querySelectorAll('.prikaz-ure').forEach(el => el.innerText = formatiranaUra);
        }

        function prikaziZaslon(id) {
            document.querySelectorAll('.zaslon').forEach(z => z.classList.remove('aktiven'));
            document.getElementById(id).classList.add('aktiven');
        }

        function izberiDan(dan, datumTekst, timestamp) {
            izbraniDan = dan;
            if (timestamp) {
                koledarDatum = new Date(timestamp); 
            }
            osveziSeznamUcencev();
            prikaziZaslon('zaslon-ucenci');
        }

        function osveziSeznamUcencev() {
            let izpis = '';
            let ogledanDatumStr = `${koledarDatum.getDate()}.${koledarDatum.getMonth() + 1}.${koledarDatum.getFullYear()}`;
            let ucenecList = [];
            
            if (prikazaniDnevi.includes(izbraniDan)) {
                let bUcenci = bazaUcencev[izbraniDan] || [];
                bUcenci.forEach((u, idx) => {
                    ucenecList.push({ ucenec: u, originalIndeks: idx, izvorniDan: izbraniDan });
                });
            }

            for (let dan in bazaUcencev) {
                bazaUcencev[dan].forEach((u, idx) => {
                    if (u.rescheduled && u.rescheduled.naKamDatum === ogledanDatumStr) {
                        if (!ucenecList.some(item => item.ucenec === u)) {
                            ucenecList.push({ ucenec: u, originalIndeks: idx, izvorniDan: dan });
                        }
                    }
                });
            }
            
            if (ucenecList.length === 0) {
                izpis = '<div style="text-align:center; padding: 20px; color: #7f8c8d;">Za ta dan ni vpisanih učencev.</div>';
            } else {
                ucenecList.forEach((item) => {
                    let ucenec = item.ucenec;
                    let prikazanTermin = ucenec.termin;
                    let opombaHtml = '';

                    if (ucenec.rescheduled) {
                        if (ucenec.rescheduled.naKamDatum === ogledanDatumStr) {
                            prikazanTermin = ucenec.rescheduled.naKamUra;
                            opombaHtml = `<div style="font-size: 12px; color: #27ae60; margin-top: 4px; font-weight: normal;">Prestavljeno iz ${ucenec.rescheduled.odKodDatum}</div>`;
                        } else if (ucenec.rescheduled.odKodDatum === ogledanDatumStr) {
                            opombaHtml = `<div style="font-size: 12px; color: #e67e22; margin-top: 4px; font-weight: normal;">${ucenec.prestavljenoOpomba}</div>`;
                        }
                    }

                    izpis += `
                    <div class="element-ovoj">
                        <div class="element-ozadje-izbris">Brišem...</div>
                        <button class="btn-meni dinamicni-izbris-element" style="margin: 0; width: 100%; padding: 12px 15px;" data-tip="ucenec" data-dan="${item.izvorniDan}" data-indeks="${item.originalIndeks}" onclick="izvediKlikUcenca(event, '${item.izvorniDan}', ${item.originalIndeks})">
                            <div style="width: 100%;">
                                <span class="termin-znacka">${prikazanTermin}</span>
                                <strong>${ucenec.ime}</strong>
                                ${opombaHtml}
                            </div>
                        </button>
                    </div>`;
                });
            }
            
            document.getElementById('seznam-ucencev-izpis').innerHTML = izpis;
            aktivirajSledilnikeZdrsa();
        }

        function prikaziProfilUcenca(dan, indeks) {
            trenutniUcenec = bazaUcencev[dan][indeks];
            
            document.getElementById('podatki-ime').innerText = trenutniUcenec.ime;
            document.getElementById('podatki-termin').innerText = trenutniUcenec.termin;
            document.getElementById('podatki-predvideno').innerText = trenutniUcenec.predvideno;
            document.getElementById('podatki-izvedeno').innerText = trenutniUcenec.izvedeno;
            document.getElementById('okence-izpis').innerText = trenutniUcenec.minute + " min";
            document.getElementById('vnos-cene-ure').value = trenutniUcenec.cenaUre || 20;
            
            let izpisEl = document.getElementById('prestavljeno-tekst-izpis');
            if (trenutniUcenec.prestavljenoOpomba) {
                izpisEl.innerText = trenutniUcenec.prestavljenoOpomba;
                izpisEl.style.display = 'block';
            } else {
                izpisEl.style.display = 'none';
            }
            
            document.getElementById('minute-gumbi').style.display = 'none';
            document.getElementById('sekcija-koledar-prestavitev').style.display = 'none';
            
            prikaziZaslon('zaslon-podatki');
        }

        function dodajUcenca() {
            let ime = prompt("Vnesite ime in priimek novega učenca:");
            if (!ime) return;
            
            let ura = 13, minute = 0;
            let zadnji = bazaUcencev[izbraniDan] ? bazaUcencev[izbraniDan][bazaUcencev[izbraniDan].length - 1] : null;
            if (zadnji && zadnji.termin) {
                let deli = zadnji.termin.split(':');
                ura = parseInt(deli[0]);
                minute = parseInt(deli[1]) + 30;
                if (minute >= 60) { ura++; minute = 0; }
            }
            let strUre = String(ura).padStart(2, '0');
            let strMin = String(minute).padStart(2, '0');

            if (!bazaUcencev[izbraniDan]) bazaUcencev[izbraniDan] = [];
            bazaUcencev[izbraniDan].push({
                id: Date.now(),
                ime: ime,
                predvideno: 4,
                izvedeno: 0,
                minute: 30,
                termin: `${strUre}:${strMin}`,
                prestavljenoOpomba: '',
                cenaUre: 20,
                rescheduled: null
            });
            osveziSeznamUcencev();
            shraniPodatke();
        }

        function urediTerminIzProfila() {
            let novTermin = prompt("Vnesite nov čas:", trenutniUcenec.termin);
            if (novTermin) {
                trenutniUcenec.termin = novTermin;
                document.getElementById('podatki-termin').innerText = novTermin;
                shraniPodatke();
            }
        }

        function zabeleziUro(uspeh) {
            if (uspeh) {
                trenutniUcenec.izvedeno++;
                alert("Ura zabeležena!");
            } else {
                // Popravljeno: Gumb "Neizvedeno" sedaj varno zmanjša števec
                trenutniUcenec.izvedeno = Math.max(0, trenutniUcenec.izvedeno - 1);
                alert("Ura odšteta / označena kot neizvedena.");
            }
            document.getElementById('podatki-izvedeno').innerText = trenutniUcenec.izvedeno;
            shraniPodatke();
        }

        function prikaziGumbaZaMinute() {
            let gumbi = document.getElementById('minute-gumbi');
            gumbi.style.display = gumbi.style.display === 'flex' ? 'none' : 'flex';
        }

        function prilagodiMinute(sprememba) {
            trenutniUcenec.minute = Math.max(0, trenutniUcenec.minute + sprememba);
            document.getElementById('okence-izpis').innerText = trenutniUcenec.minute + " min";
            shraniPodatke();
        }

        function generirajPodatkeRacuna() {
            let cena = parseFloat(document.getElementById('vnos-cene-ure').value) || 20;
            trenutniUcenec.cenaUre = cena;
            let skupaj = trenutniUcenec.izvedeno * cena;
            
            let vsebina = `
                <h3 style="text-align:center;">RAČUN / SPECIFIKACIJA</h3>
                <hr>
                <p><strong>Učenec:</strong> ${trenutniUcenec.ime}</p>
                <p><strong>Dolžina ure:</strong> ${trenutniUcenec.minute} min</p>
                <p><strong>Izvedene ure:</strong> ${trenutniUcenec.izvedeno}</p>
                <p><strong>Cena na uro:</strong> ${cena} €</p>
                <hr>
                <p style="font-size: 16px; text-align:right;"><strong>SKUPAJ: ${skupaj} €</strong></p>
            `;
            document.getElementById('vsebina-pdf-racuna').innerHTML = vsebina;
            prikaziZaslon('zaslon-racun');
            shraniPodatke();
        }

        function nazajNaDneve() { osveziKoledar(); prikaziZaslon('zaslon-dnevi'); }
        function nazajNaUcence() { osveziSeznamUcencev(); prikaziZaslon('zaslon-ucenci'); }
        function nazajNaPodatke() { prikaziZaslon('zaslon-podatki'); }

        // ZAGON STRANI IN NALAGANJE PODATKOV
        naloziPodatke();
        posodobiUro();
        setInterval(posodobiUro, 30000);
        osveziKoledar();
        // PRISILNI IZBRIS STAREGA UPRAVITELJA (URGENT CACHE CLEAR)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
</body>
</html>
